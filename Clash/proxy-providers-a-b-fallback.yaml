    proxies: [DIRECT, 美国节点, 新加坡节点, 香港节点]

  - name: Amazon
    type: select
    proxies: [手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: Github
    type: select
    proxies: [手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: OpenAI
    type: select
    proxies: [AI节点, 手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: Claude
    type: select
    proxies: [AI节点, 手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: Gemini
    type: select
    proxies: [AI节点, 手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: 巴姆哈特
    type: select
    proxies: [台湾节点, 手动切换, 新加坡节点, 香港节点]

  - name: Twitter
    type: select
    proxies: [手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: Telegram
    type: select
    proxies: [手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: PayPal
    type: select
    proxies: [美国节点, 新加坡节点, 香港节点]

  - name: Netflix
    type: select
    proxies: [手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: Nintendo
    type: select
    proxies: [手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: 微软服务
    type: select
    proxies: [手动切换, 美国节点, 新加坡节点, 香港节点, DIRECT]

  - name: 哔哩哔哩
    type: select
    proxies: [DIRECT, 手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: Bobby
    type: select
    proxies: [美国节点, 新加坡节点, 香港节点, 手动切换]

  - name: apiopenai
    type: select
    proxies: [AI节点, 手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: HoYoGames
    type: select
    proxies: [DIRECT, 手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: 游戏平台
    type: select
    proxies: [香港游戏, 美国-游戏, 手动切换, 美国节点, 新加坡节点, 香港节点, DIRECT]

  - name: 漏网之鱼
    type: select
    proxies: [手动切换, 美国节点, 新加坡节点, 香港节点, DIRECT]

  # 先选带 AI 标记的美国节点；都失效时再退回普通美国/新加坡/香港
  - name: AI节点
    type: fallback
    proxies: [AI节点-A, AI节点-B]
    url: http://www.gstatic.com/generate_204
    interval: 600

  # 每个地区先用 A 订阅测速，A 该地区全失效时自动切到 B
  - name: 美国节点
    type: fallback
    proxies: [美国节点-A, 美国节点-B]
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 香港节点
    type: fallback
    proxies: [香港节点-A, 香港节点-B]
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 新加坡节点
    type: fallback
    proxies: [新加坡节点-A, 新加坡节点-B]
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 台湾节点
    type: fallback
    proxies: [台湾节点-A, 台湾节点-B]
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: AI节点-A
    type: url-test
    use: [sub-a]
    filter: "((🇺🇸|美国).*(?i)Gemini|(?i)Gemini.*(🇺🇸|美国))"
    exclude-filter: "(限速|(?i)限速|(?i)rate[ -]?limit)"
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: AI节点-B
    type: url-test
    use: [sub-b]
    filter: "((🇺🇸|美国).*((?i)\\b1x\\b|1倍|一倍|倍率1|1x倍率|1.0x)|((?i)\\b1x\\b|1倍|一倍|倍率1|1x倍率|1.0x).*(🇺🇸|美国))"
    exclude-filter: "(限速|(?i)限速|(?i)rate[ -]?limit|(?i)([2-9]|[1-9][0-9]+)\\s*(x|倍)|[2-9]倍|[1-9][0-9]+倍|[二三四五六七八九十百]+倍)"
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 香港节点-A
    type: fallback
    proxies: [香港节点-A-优选, 香港节点-A-基础]
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 香港节点-A-优选
    type: url-test
    use: [sub-a]
    filter: "(((香港|🇭🇰|(?i)\\bHK\\b|(?i)Hong[ _-]?Kong|(?i)\\bHKG\\b).*((?i)\\b([1-9]|[1-9][0-9]+)(x|倍)\\b|[1-9]倍|[1-9][0-9]+倍|[一二三四五六七八九十百]+倍)|((?i)\\b([1-9]|[1-9][0-9]+)(x|倍)\\b|[1-9]倍|[1-9][0-9]+倍|[一二三四五六七八九十百]+倍).*(香港|🇭🇰|(?i)\\bHK\\b|(?i)Hong[ _-]?Kong|(?i)\\bHKG\\b))|(?i)VIP)"
    exclude-filter: "(限速|(?i)限速|(?i)rate[ -]?limit)"
    tolerance: 100
    timeout: 800
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 香港节点-A-基础
    type: url-test
    use: [sub-a]
    filter: "(香港|🇭🇰|(?i)\\bHK\\b|(?i)Hong[ _-]?Kong|(?i)\\bHKG\\b)"
    exclude-filter: "(限速|(?i)限速|(?i)rate[ -]?limit|(?i)\\b([1-9]|[1-9][0-9]+)(x|倍)\\b|[1-9]倍|[1-9][0-9]+倍|[一二三四五六七八九十百]+倍)"
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 美国节点-A
    type: url-test
    use: [sub-a]
    filter: "(美国|🇺🇸|洛杉矶|(?i)\\bUS\\b|(?i)\\bUSA\\b|(?i)America|(?i)United[ _-]?States)"
    exclude-filter: "((?i)Gemini|低延迟|(?i)low[ _-]?latency|游戏|(?i)game)"
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 美国节点-B
    type: url-test
    use: [sub-b]
    filter: "(美国|🇺🇸)"
    exclude-filter: "(限速|(?i)限速|(?i)rate[ -]?limit|(?i)([2-9]|[1-9][0-9]+)\\s*(x|倍)|[2-9]倍|[1-9][0-9]+倍|[二三四五六七八九十百]+倍)"
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 香港游戏
    type: fallback
    proxies: [香港节点-A-优选, 香港节点-A-基础, 香港节点-B]
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 美国-游戏
    type: fallback
    proxies: [美国-游戏-A, 美国节点-B]
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 美国-游戏-A
    type: url-test
    use: [sub-a]
    filter: "((美国|🇺🇸).*((?i)game|游戏|low[ _-]?latency|低延迟)|((?i)game|游戏|low[ _-]?latency|低延迟).*(美国|🇺🇸))"
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 香港节点-B
    type: url-test
    use: [sub-b]
    filter: "(香港|🇭🇰|(?i)\\bHK\\b|(?i)Hong[ _-]?Kong|(?i)\\bHKG\\b)"
    exclude-filter: "(限速|(?i)限速|(?i)rate[ -]?limit|(?i)\\b([2-9]|[1-9][0-9]+)(x|倍)\\b|[2-9]倍|[1-9][0-9]+倍|[二三四五六七八九十百]+倍)"
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 新加坡节点-A
    type: url-test
    use: [sub-a]
    filter: "(新加坡|🇸🇬|狮城|(?i)\\bSG\\b|(?i)Singapore)"
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 新加坡节点-B
    type: url-test
    use: [sub-b]
    filter: "(新加坡|🇸🇬|狮城|(?i)\\bSG\\b|(?i)Singapore)"
    exclude-filter: "(限速|(?i)限速|(?i)rate[ -]?limit|(?i)\\b([2-9]|[1-9][0-9]+)(x|倍)\\b|[2-9]倍|[1-9][0-9]+倍|[二三四五六七八九十百]+倍)"
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 台湾节点-A
    type: url-test
    use: [sub-a]
    filter: "(台湾|台北|新北|🇹🇼|(?i)\\bTW\\b|(?i)Taiwan)"
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: 台湾节点-B
    type: url-test
    use: [sub-b]
    filter: "(台湾|台北|新北|🇹🇼|(?i)\\bTW\\b|(?i)Taiwan)"
    exclude-filter: "(限速|(?i)限速|(?i)rate[ -]?limit|(?i)\\b([2-9]|[1-9][0-9]+)(x|倍)\\b|[2-9]倍|[1-9][0-9]+倍|[二三四五六七八九十百]+倍)"
    url: http://www.gstatic.com/generate_204
    interval: 600

