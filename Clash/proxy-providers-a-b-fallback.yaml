  - name: 国内网站
    type: select
    proxies: [DIRECT, 手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: Google
    type: select
    proxies: [手动切换, 美国节点, 新加坡节点, 香港节点]

  - name: GoogleVoice
    type: select
    proxies: [手动切换, 美国节点, 新加坡节点, 香港节点]

