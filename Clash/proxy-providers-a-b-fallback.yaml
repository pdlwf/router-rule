# ===== OpenClash 双订阅主配置：订阅 A 优先，订阅 B 同地区兜底 =====
# 使用方式：
# 1. 把 sub-a / sub-b 的 url 替换成你的两个 Clash 订阅地址
# 2. 在 OpenClash 中直接导入这个 YAML，而不是再走 Config.ini 在线转换模板
# 3. 每个地区先从 A 里自动测速选优；如果 A 该地区全失效，再自动切到 B
# 4. 这份配置尽量复用了当前 Config.ini 的分流逻辑，只是把底层节点来源改成了双 provider

mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
unified-delay: true
tcp-concurrent: true

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  respect-rules: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver-policy:
    "rule-set:国内网站":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "is.domainforsub.work":
      - 223.5.5.5
      - 119.29.29.29
    "link01.nobodys.uk":
      - 223.5.5.5
      - 119.29.29.29
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver-policy:
    "is.domainforsub.work":
      - 223.5.5.5
      - 119.29.29.29
    "link01.nobodys.uk":
      - 223.5.5.5
      - 119.29.29.29
  direct-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver-follow-policy: true
  fallback-filter:
    geoip: true
    geoip-code: CN

proxy-providers:
  sub-a:
    type: http
    path: ./providers/proxy/sub-a.yaml
    url: "订阅A地址"
    interval: 3600
    proxy: DIRECT
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600
    override:
      additional-prefix: "[A] "

  sub-b:
    type: http
    path: ./providers/proxy/sub-b.yaml
    url: "订阅B地址"
    interval: 3600
    proxy: DIRECT
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600
    override:
      additional-prefix: "[B] "

proxy-groups:
  - name: 手动切换
    type: select
    proxies: [美国节点, 新加坡节点, 香港节点, DIRECT, REJECT]

  - name: 国外网站
