美国-游戏 = fallback,美国-游戏-A,美国节点-B,interval=600,timeout=5,select=0,url=http://www.gstatic.com/generate_204

美国AI节点-A = url-test,订阅A,use=true,policy-regex-filter=(?=.*(GEMINI|Gemini|gemini|Claude|OpenAI|ChatGPT|AI))(?=.*(US|USA|America|america|United|united|美国|凤凰城|洛杉矶|西雅图|芝加哥|纽约|沪美|美)).*$,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204
美国AI节点-B = url-test,订阅B,use=true,policy-regex-filter=(?=.*(1[xX]|1倍|一倍|倍率1|1\\.0[xX]|GEMINI|Gemini|gemini|Claude|OpenAI|ChatGPT|AI))(?=.*(US|USA|America|america|United|united|美国|凤凰城|洛杉矶|西雅图|芝加哥|纽约|沪美|美))^((?!(限速|[Rr]ate|([2-9]|[1-9][0-9]+)[xX]|([2-9]|[1-9][0-9]+)倍)).)*$,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204

美国节点-A = url-test,订阅A,use=true,policy-regex-filter=(?=.*(US|USA|America|america|United|united|美国|凤凰城|洛杉矶|西雅图|芝加哥|纽约|沪美|美))^((?!(GEMINI|Gemini|gemini|Claude|OpenAI|ChatGPT|AI|游戏|[Gg]ame|低延迟|[Ll]ow)).)*$,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204
美国节点-B = url-test,订阅B,use=true,policy-regex-filter=(?=.*(US|USA|America|america|United|united|美国|凤凰城|洛杉矶|西雅图|芝加哥|纽约|沪美|美))^((?!(限速|[Rr]ate|([2-9]|[1-9][0-9]+)[xX]|([2-9]|[1-9][0-9]+)倍|游戏|[Gg]ame|低延迟|[Ll]ow)).)*$,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204
美国-游戏-A = url-test,订阅A,use=true,policy-regex-filter=(?=.*(US|USA|America|america|United|united|美国|凤凰城|洛杉矶|西雅图|芝加哥|纽约|沪美|美))(?=.*(游戏|[Gg]ame|低延迟|[Ll]ow)).*$,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204

香港节点-A = fallback,香港节点-A-优选,香港节点-A-基础,interval=600,timeout=5,select=0,url=http://www.gstatic.com/generate_204
香港节点-A-优选 = url-test,订阅A,use=true,policy-regex-filter=(?=.*(HK|Hong|hong|香港|深港|沪港|京港|港))(?=.*([1-9][xX]|[1-9]倍|VIP)).*$,interval=600,tolerance=100,timeout=5,select=0,url=http://www.gstatic.com/generate_204
香港节点-A-基础 = url-test,订阅A,use=true,policy-regex-filter=(?=.*(HK|Hong|hong|香港|深港|沪港|京港|港))^((?!(限速|[Rr]ate|VIP|[1-9][xX]|[1-9]倍)).)*$,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204
香港节点-B = url-test,订阅B,use=true,policy-regex-filter=(?=.*(HK|Hong|hong|香港|深港|沪港|京港|港))^((?!(限速|[Rr]ate|([2-9]|[1-9][0-9]+)[xX]|([2-9]|[1-9][0-9]+)倍)).)*$,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204

台湾节点-A = url-test,订阅A,use=true,policy-regex-filter=TW|Taiwan|taiwan|台湾|台北|台中|新北|彰化,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204
台湾节点-B = url-test,订阅B,use=true,policy-regex-filter=(?=.*(TW|Taiwan|taiwan|台湾|台北|台中|新北|彰化))^((?!(限速|[Rr]ate|([2-9]|[1-9][0-9]+)[xX]|([2-9]|[1-9][0-9]+)倍)).)*$,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204

日本节点-A = url-test,订阅A,use=true,policy-regex-filter=JP|Japan|japan|Tokyo|tokyo|日本|东京|大阪|京日|苏日|沪日|上日|川日|深日|广日,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204
日本节点-B = url-test,订阅B,use=true,policy-regex-filter=(?=.*(JP|Japan|japan|Tokyo|tokyo|日本|东京|大阪|京日|苏日|沪日|上日|川日|深日|广日))^((?!(限速|[Rr]ate|([2-9]|[1-9][0-9]+)[xX]|([2-9]|[1-9][0-9]+)倍)).)*$,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204

新加坡节点-A = url-test,订阅A,use=true,policy-regex-filter=SG|Sing|sing|新加坡|狮城|沪新|京新|深新|杭新|广新,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204
新加坡节点-B = url-test,订阅B,use=true,policy-regex-filter=(?=.*(SG|Sing|sing|新加坡|狮城|沪新|京新|深新|杭新|广新))^((?!(限速|[Rr]ate|([2-9]|[1-9][0-9]+)[xX]|([2-9]|[1-9][0-9]+)倍)).)*$,interval=600,tolerance=50,timeout=5,select=0,url=http://www.gstatic.com/generate_204

