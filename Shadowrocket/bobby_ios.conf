香港节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=50,timeout=5,select=0,policy-regex-filter=HK|Hong|hong|香港|深港|沪港|京港|港
台湾节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=50,timeout=5,select=0,policy-regex-filter=TW|Taiwan|taiwan|台湾|台北|台中|新北|彰化
日本节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=50,timeout=5,select=0,policy-regex-filter=JP|Japan|japan|Tokyo|tokyo|日本|东京|大阪|京日|苏日|沪日|上日|川日|深日|广日
新加坡节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=50,timeout=5,select=0,policy-regex-filter=SG|Sing|sing|新加坡|狮城|沪新|京新|深新|杭新|广新
快速节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=50,timeout=5,select=0,policy-regex-filter=AnyPath|虚通|BGP|IEPL|专线|优化|低延迟
美国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=50,timeout=5,select=0,policy-regex-filter=US|USA|America|america|United|united|美国|凤凰城|洛杉矶|西雅图|芝加哥|纽约|沪美|美
美国AI节点 = url-test,url=http://www.gstatic.com/generate_204,interval=600,tolerance=50,timeout=5,select=0,policy-regex-filter=(?=.*(GEMINI|Gemini|gemini))(?=.*(US|USA|America|america|United|united|美国|凤凰城|洛杉矶|西雅图|芝加哥|纽约|沪美|美)).*$

